<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>DYRECTIO · Luigi Stips</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Sans:opsz,wght@12..72,400;12..72,500;12..72,600;12..72,700&display=swap');

:root{
  color-scheme:dark;
  --font-sans:'Instrument Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --font-mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Consolas,monospace;
  --bg:#09080d; --surface:#111016; --surface2:#17161d; --surface3:#1e1d25; --surface4:#26242e;
  --s1:var(--surface); --s2:var(--surface2); --s3:var(--surface3); --s4:var(--surface4);
  --border:#292731; --border2:#3a3744; --line-soft:rgba(255,255,255,.06);
  --text:#f7f6f8; --text2:#a7a3ad; --text3:#6f6a78; --muted:var(--text3);
  --silver:#c9c6ce; --accent:#8d78ff; --accent-rgb:141,120,255; --accent-dim:rgba(var(--accent-rgb),.12);
  --company-color:var(--accent); --company-dim:var(--accent-dim);
  --green:#55d98a; --yellow:#e7bf66; --orange:#e98a51; --purple:#b18cff; --red:#ef6868; --accent2:#6e9fd0;
  --todo:#85818c; --inprogress:var(--yellow); --done:var(--green); --incomplete:var(--orange); --missingfiles:var(--purple);
  --space-1:4px; --space-2:8px; --space-3:12px; --space-4:16px; --space-5:20px; --space-6:24px; --space-7:32px; --space-8:40px; --space-9:48px; --space-10:64px;
  --radius-xs:6px; --radius-sm:10px; --radius-md:14px; --radius-lg:18px; --radius-xl:24px; --radius-pill:999px;
  --r:var(--radius-sm); --r2:var(--radius-md); --sidebar:244px;
  --shadow-1:0 1px 2px rgba(0,0,0,.28),0 10px 28px rgba(0,0,0,.16);
  --shadow-2:0 18px 60px rgba(0,0,0,.42);
  --ease:cubic-bezier(.2,.8,.2,1);
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg)}
body{background:radial-gradient(circle at 18% -10%,rgba(79,58,124,.16),transparent 28%),var(--bg);color:var(--text);font-family:var(--font-sans);min-height:100vh;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
button,input,select,textarea{font:inherit} button{color:inherit}
::selection{background:var(--accent-dim);color:var(--text)}

/* DYRECTIO brand */
.sb-logo{padding:22px 18px 18px;border-bottom:1px solid var(--border)}
.logo-mark,.header-left h1{font-weight:700;letter-spacing:-.035em}
.logo-mark{font-size:18px}.logo-mark span,.header-left h1 span{color:var(--company-color)}
.logo-sub,.header-sub{font-family:var(--font-mono);font-size:9px;line-height:1.5;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-top:5px}

/* layout */
#app-body{display:flex;min-height:100vh} #main{flex:1;min-width:0}
#sidebar{width:var(--sidebar);height:100vh;position:sticky;top:0;display:flex;flex-direction:column;background:rgba(17,16,22,.86);backdrop-filter:blur(20px);border-right:1px solid var(--border);overflow-y:auto}
.sb-section{padding:22px 14px 7px;font-family:var(--font-mono);font-size:9px;font-weight:500;letter-spacing:.13em;text-transform:uppercase;color:var(--text3)}
.sb-nav{display:flex;flex-direction:column;gap:4px;padding:0 10px}.sb-item{display:flex;align-items:center;gap:10px;width:100%;padding:10px 11px;border:0;border-radius:10px;background:transparent;color:var(--text2);font-size:13px;font-weight:550;text-align:left;cursor:pointer;transition:.18s var(--ease)}
.sb-item:hover{background:var(--surface2);color:var(--text)}.sb-item.active{background:var(--company-dim);color:var(--company-color);box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--company-color) 20%,transparent)}
.sb-icon{width:17px;height:17px;opacity:.74}.sb-item.active .sb-icon{opacity:1}.sb-badge{margin-left:auto;padding:2px 7px;border-radius:999px;background:var(--surface3);font-family:var(--font-mono);font-size:9px;color:var(--text3)}
.sb-item.active .sb-badge{background:var(--company-color);color:#fff}.sb-spacer{flex:1}.sb-footer{padding:12px;border-top:1px solid var(--border)}
.conn-pill,#conn-status{display:flex;align-items:center;gap:7px;border:1px solid var(--border);background:var(--surface2);border-radius:999px;padding:7px 10px;color:var(--text3);font-family:var(--font-mono);font-size:9px}.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}.conn-dot.live,.status-dot{background:var(--green);box-shadow:0 0 0 4px rgba(85,217,138,.08)}

.page,.main-panel,main{padding:34px 40px 56px;max-width:1180px}.page{display:none}.main-panel{display:none}.page.active,.main-panel.active,.company-panel.active{display:block;animation:fadeIn .24s var(--ease)}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.ph,header{margin-bottom:30px}.ph h1,.header-left h1{font-size:clamp(28px,3vw,40px);line-height:1.04;font-weight:700;letter-spacing:-.045em}.ph p{font-size:14px;color:var(--text2);margin-top:8px}.ph-row,header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
header{padding:28px 32px 22px;border-bottom:1px solid var(--border);margin-bottom:0}.header-right{display:flex;align-items:center;gap:8px}

/* cards */
.card,.card-sm,.stat-card,.stat,.fin-card,.split-card,.train-cal-wrap,.profile-block,.target-card,.tracker-sum-card{background:linear-gradient(180deg,rgba(255,255,255,.018),transparent),var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-1)}
.card{border-radius:var(--radius-md);padding:20px}.card-sm{border-radius:var(--radius-sm);padding:15px 16px}
.stats-grid,.stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}.stat-card,.stat{border-radius:var(--radius-md);padding:18px;min-height:112px}.stat-label,.fin-label,.target-label,.tracker-sum-label{font-family:var(--font-mono);font-size:9px;line-height:1.4;font-weight:500;text-transform:uppercase;letter-spacing:.11em;color:var(--text3);margin-bottom:10px}.stat-num,.fin-amount,.target-num,.tracker-sum-num{font-size:30px;line-height:1;font-weight:650;letter-spacing:-.045em}.stat-sub,.target-sub{font-size:11px;color:var(--text2);margin-top:9px}.progress-bar,.stat-bar-inner,.progress-row{height:3px;background:var(--surface4);border-radius:999px;margin-top:12px;overflow:hidden}.progress-fill,.stat-bar-fill{height:100%;border-radius:inherit;background:var(--company-color)}

/* controls */
.add-row,.add-section,.sub-add-row,.add-subtask-row{display:flex;align-items:center;gap:10px}.add-row,.add-section{margin-bottom:18px}.add-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px}
.add-input,.add-section input,.sub-add-row input,.add-subtask-row input,.modal-note,.task-name-edit,.subtask-name-edit,.edit-inp,.sel,.status-select,.fin-select{background:var(--surface2);border:1px solid var(--border);color:var(--text);outline:none;transition:.18s var(--ease)}
.add-input,.add-section input,.sub-add-row input,.add-subtask-row input,.modal-note,.task-name-edit,.subtask-name-edit,.edit-inp{border-radius:10px;padding:11px 13px;font-size:13px}.add-input,.add-section input{flex:1;min-width:0}.add-section input{background:transparent;border-color:transparent}.add-input:focus,.add-section input:focus,.sub-add-row input:focus,.add-subtask-row input:focus,.modal-note:focus,.task-name-edit:focus,.subtask-name-edit:focus,.edit-inp:focus,.sel:focus,.status-select:focus,.fin-select:focus{border-color:var(--company-color);box-shadow:0 0 0 3px var(--company-dim)}
::placeholder{color:var(--text3)}.sel,.status-select,.fin-select{border-radius:8px;padding:7px 9px;font-size:11px;font-weight:600}
.btn-primary,.btn-add,.btn-sub,.btn-ghost,#backoffice-btn{border-radius:10px;padding:10px 14px;font-size:12px;font-weight:650;cursor:pointer;transition:.18s var(--ease);white-space:nowrap}.btn-primary,.btn-add{border:1px solid color-mix(in srgb,var(--company-color) 72%,white 8%);background:var(--company-color);color:#fff;box-shadow:0 8px 20px color-mix(in srgb,var(--company-color) 18%,transparent)}.btn-primary:hover,.btn-add:hover{transform:translateY(-1px);filter:brightness(1.06)}.btn-ghost,.btn-sub,#backoffice-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text2)}.btn-ghost:hover,.btn-sub:hover,#backoffice-btn:hover{color:var(--text);border-color:var(--border2);background:var(--surface3)}
.ibtn,.icon-btn,.cal-nav button,.tracker-month-nav button{display:inline-grid;place-items:center;background:transparent;border:0;color:var(--text3);cursor:pointer;border-radius:8px;transition:.18s}.ibtn:hover,.icon-btn:hover,.cal-nav button:hover,.tracker-month-nav button:hover{background:var(--surface3);color:var(--text)}

/* task system */
.task-list,.tasks-list{display:flex;flex-direction:column;gap:8px}.task-row,.task-item{display:flex;align-items:center;gap:12px;padding:14px 15px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);transition:.16s var(--ease)}.task-row:hover,.task-item:hover{background:var(--surface2);border-color:var(--border2)}
.task-row.s-inprogress,.task-item.status-inprogress{border-left:2px solid var(--inprogress)}.task-row.s-done,.task-item.status-done{border-left:2px solid var(--done)}.task-row.s-incomplete,.task-item.status-incomplete{border-left:2px solid var(--incomplete)}.task-row.s-missingfiles,.task-item.status-missingfiles{border-left:2px solid var(--missingfiles)}.task-row.s-todo,.task-item.status-todo{border-left:2px solid var(--border2)}
.task-name{flex:1;min-width:0;font-size:14px;font-weight:520;line-height:1.45;overflow-wrap:anywhere}.s-done .task-name,.status-done .task-name{text-decoration:line-through;color:var(--text3)}.task-meta{display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:wrap}.task-date{font-family:var(--font-mono);font-size:9px;color:var(--text3)}
.badge,.status-badge,.fin-status,.blocked-badge,.profile-stat-pill,.urgent-pill{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}.badge-todo{background:rgba(133,129,140,.12);color:var(--todo)}.badge-inprogress{background:rgba(231,191,102,.13);color:var(--inprogress)}.badge-done{background:rgba(85,217,138,.12);color:var(--done)}.badge-incomplete{background:rgba(233,138,81,.13);color:var(--incomplete)}.badge-missingfiles{background:rgba(177,140,255,.13);color:var(--missingfiles)}.badge-project{background:var(--surface3);color:var(--text2)}
.exp-btn,.expand-btn{display:flex;align-items:center;gap:4px;background:transparent;border:0;color:var(--text3);cursor:pointer}.exp-count,.sub-count{min-width:20px;text-align:center;padding:2px 6px;border-radius:999px;background:var(--surface3);font-family:var(--font-mono);font-size:9px}.exp-arrow,.arrow{transition:transform .2s}.open .exp-arrow,.expand-btn.open .arrow{transform:rotate(90deg)}
.subtask-panel,.subtasks-panel{max-height:0;overflow:hidden;background:var(--surface2);border:1px solid var(--border);border-top:0;border-radius:0 0 var(--radius-md) var(--radius-md);transition:max-height .28s var(--ease),padding .28s var(--ease)}.subtask-panel.open,.subtasks-panel.open{max-height:1400px;padding:12px 14px 14px 30px}.open-top,.has-subtasks-open>.task-item{border-radius:var(--radius-md) var(--radius-md) 0 0;border-bottom-color:transparent}.sub-row,.subtask-item{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--surface3);border:1px solid var(--border);border-radius:10px;font-size:12px;margin-bottom:6px}.sub-name,.subtask-name{flex:1;min-width:0;overflow-wrap:anywhere}

/* tabs */
.tabs,.main-tabs,.tracker-tabs{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:22px;overflow-x:auto;scrollbar-width:none}.tab,.tab-btn,.main-tab,.tracker-tab{border:0;border-bottom:2px solid transparent;background:transparent;color:var(--text3);padding:11px 13px;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}.tab:hover,.tab-btn:hover,.main-tab:hover,.tracker-tab:hover{color:var(--text)}.tab.active,.tab-btn.active,.main-tab.active,.tracker-tab.active{color:var(--company-color);border-bottom-color:var(--company-color)}.tab-count{padding:2px 6px;border-radius:999px;background:var(--surface3);font-family:var(--font-mono);font-size:9px}.active>.tab-count,.tab.active .tab-count{background:var(--company-color);color:#fff}

/* finance & calendars */
.fin-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:22px}.fin-card{border-radius:var(--radius-md);padding:18px}.fin-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-bottom:1px solid var(--line-soft)}.fin-row:last-child{border:0}.fin-name{flex:1;font-size:13px}.fin-client,.fin-date{font-family:var(--font-mono);font-size:9px;color:var(--text3)}.fin-amt{font-weight:650}.pos{color:var(--green)}.neg{color:var(--red)}
.train-cal-wrap{border-radius:var(--radius-lg);padding:20px;margin-bottom:22px}.cal-header,.tracker-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}.cal-title,.tracker-title{font-weight:650}.cal-nav,.tracker-month-nav{display:flex;gap:6px}.cal-nav button,.tracker-month-nav button{width:32px;height:32px;border:1px solid var(--border);background:var(--surface2)}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.cal-dow{text-align:center;font-family:var(--font-mono);font-size:8px;color:var(--text3);text-transform:uppercase;padding:6px}.cal-day{aspect-ratio:1;display:grid;place-items:center;border:1px solid transparent;border-radius:10px;font-size:11px;cursor:pointer;position:relative}.cal-day:hover:not(.empty):not(.future){background:var(--surface2);border-color:var(--border)}.cal-day.today{border-color:var(--border2)}.split-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.split-card{border-radius:var(--radius-md);padding:16px}.split-btns{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}.split-btn{padding:13px 8px;border-radius:10px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-weight:650;cursor:pointer}

/* modal sheet */
.modal-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:flex-end;justify-content:center;background:rgba(3,2,6,.72);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:.22s}.modal-overlay.open{opacity:1;pointer-events:auto}.modal{width:min(100%,520px);padding:12px 22px 26px;background:var(--surface);border:1px solid var(--border2);border-bottom:0;border-radius:24px 24px 0 0;box-shadow:var(--shadow-2);transform:translateY(24px);transition:.28s var(--ease)}.modal-overlay.open .modal{transform:none}.modal-handle{width:38px;height:4px;border-radius:99px;background:var(--border2);margin:0 auto 18px}.modal-title{font-size:18px;font-weight:650;margin-bottom:12px}.modal-date{padding:10px 12px;border-radius:10px;background:var(--surface2);font-size:12px;color:var(--text2);margin-bottom:14px}.modal-actions{display:flex;justify-content:flex-end;gap:8px}

/* CSV import visual component */
.csv-import{margin-bottom:22px;padding:18px;border:1px dashed color-mix(in srgb,var(--company-color) 42%,var(--border));border-radius:var(--radius-lg);background:linear-gradient(180deg,var(--company-dim),transparent 72%),var(--surface);display:flex;align-items:center;justify-content:space-between;gap:18px}.csv-import__copy{display:flex;align-items:flex-start;gap:12px}.csv-import__icon{width:38px;height:38px;display:grid;place-items:center;border-radius:11px;background:var(--company-dim);color:var(--company-color);font-family:var(--font-mono);font-weight:600}.csv-import h3{font-size:14px;font-weight:650}.csv-import p{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.45}.csv-import input[type=file]{position:absolute;inline-size:1px;block-size:1px;opacity:0;pointer-events:none}.csv-import__button{display:inline-flex;align-items:center;gap:8px;padding:10px 13px;border:1px solid var(--border2);border-radius:10px;background:var(--surface2);font-size:12px;font-weight:650;cursor:pointer}.csv-import__button:hover{border-color:var(--company-color);color:var(--company-color)}

/* tracker */
.profile-block{border-radius:var(--radius-md);overflow:hidden}.profile-block-header,.content-type-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 15px;border-bottom:1px solid var(--border)}.profile-block-name{font-weight:650}.days-grid{display:flex;flex-wrap:wrap;gap:5px;flex:1}.day-btn{width:27px;height:27px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text3);font-family:var(--font-mono);font-size:9px;font-weight:600;cursor:pointer}.day-btn:hover{border-color:var(--company-color);color:var(--company-color)}.day-btn.published{background:var(--company-color);border-color:var(--company-color);color:#0b0a0e}.day-btn.today{box-shadow:0 0 0 2px var(--company-dim)}

/* mobile */
#bottom-nav{display:none}.bn-inner{display:flex}.bn-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 4px;border:0;background:transparent;color:var(--text3);font-family:var(--font-mono);font-size:8px;text-transform:uppercase}.bn-item.active{color:var(--company-color)}.bn-item svg{width:19px;height:19px}
#toast{position:fixed;right:20px;bottom:20px;z-index:999;padding:11px 14px;border:1px solid var(--border2);border-radius:10px;background:var(--surface2);box-shadow:var(--shadow-2);font-size:12px;opacity:0;transform:translateY(8px);transition:.2s}.show#toast,#toast.show{opacity:1;transform:none}.empty,.empty-state{text-align:center;padding:30px;border:1px dashed var(--border);border-radius:var(--radius-md);color:var(--text3);font-size:12px}
#loading{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--bg)}.spinner,.loader{width:30px;height:30px;border:2px solid var(--border);border-top-color:var(--company-color);border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}#loading p{font-family:var(--font-mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
body.readonly .edit-only,body.readonly .status-select,body.readonly .sel{display:none!important}

@media(max-width:760px){#sidebar{display:none}#bottom-nav{display:block;position:fixed;left:0;right:0;bottom:0;z-index:80;background:rgba(17,16,22,.94);backdrop-filter:blur(18px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}#main{padding-bottom:74px}.page,.main-panel,main{padding:24px 16px 96px}.ph h1,.header-left h1{font-size:28px}.stats-grid,.stats-bar{grid-template-columns:repeat(2,1fr)}.split-grid{grid-template-columns:1fr}.fin-grid{grid-template-columns:1fr}.task-row,.task-item{align-items:flex-start}.task-meta{max-width:42%}.badge-project{display:none}.csv-import{align-items:flex-start;flex-direction:column}.csv-import__button{width:100%;justify-content:center}.subtask-panel.open,.subtasks-panel.open{padding-left:14px}.content-type-row{align-items:flex-start;flex-direction:column}.split-btns{grid-template-columns:1fr}.modal{padding-inline:16px}}


/* ═══════════════ DYRECTIO restyle v3 — Apple premium ═══════════════ */

/* scrollbar + focus */
*::-webkit-scrollbar{width:8px;height:8px}
*::-webkit-scrollbar-track{background:transparent}
*::-webkit-scrollbar-thumb{background:var(--surface4);border-radius:999px}
*::-webkit-scrollbar-thumb:hover{background:var(--border2)}
html{scrollbar-color:var(--surface4) transparent;scrollbar-width:thin}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px}

/* ── Tipografia ── */
.ph h1,.header-left h1{font-size:28px;font-weight:700;letter-spacing:-.02em;font-family:var(--font-sans);line-height:1.1}
.ph p{font-size:14px;color:var(--text2);margin-top:8px;line-height:1.5}
.sb-section,.today-section h3,.sec-title,.stat-label,.fin-label,.target-label,.tracker-sum-label,.qa-row label{font-family:var(--font-mono);font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.task-name,.sub-name,.subtask-name{font-size:15px;font-weight:500;line-height:1.5}
.task-date,.fin-client,.fin-date{font-family:var(--font-mono);font-size:11px;color:var(--text3)}

/* ── Spaziature ── */
.page,.main-panel,main{padding:28px 32px 72px;max-width:1180px}
.task-list,.tasks-list{gap:10px}
.card-sm,.split-card,.fin-card{padding:16px}
.task-row,.task-item{padding:16px}
.ph{margin-bottom:26px}
.today-section{margin-bottom:30px}
.today-section h3{margin-bottom:12px}

/* ── Task card ── */
.task-row,.task-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);transition:background .12s ease,border-color .12s ease}
.task-row:hover,.task-item:hover{background:var(--surface2)}
.task-row.s-todo,.task-item.status-todo{border-left:2px solid var(--border2)}
.task-row.s-inprogress,.task-item.status-inprogress{border-left:2px solid var(--yellow)}
.task-row.s-done,.task-item.status-done{border-left:2px solid var(--green)}
.task-row.s-incomplete,.task-item.status-incomplete{border-left:2px solid var(--orange)}
.task-row.s-missingfiles,.task-item.status-missingfiles{border-left:2px solid var(--purple)}
.badge,.status-badge,.fin-status,.profile-stat-pill{font-family:var(--font-mono);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;border-radius:999px;padding:4px 9px}
.exp-btn,.expand-btn{gap:5px}
.exp-arrow,.arrow{font-size:16px;line-height:1}
.exp-count,.sub-count{min-width:22px;padding:2px 7px;border-radius:999px;background:var(--surface3);font-family:var(--font-mono);font-size:10px}

/* ── Stat card ── */
.stat-card,.stat,.target-card,.tracker-sum-card{background:linear-gradient(145deg,var(--surface) 0%,var(--surface2) 100%);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow-1)}
.stat-num,.fin-amount,.target-num,.tracker-sum-num{font-size:32px;font-weight:700;letter-spacing:-.03em;font-variant-numeric:tabular-nums}
.stat-label,.fin-label,.target-label,.tracker-sum-label{margin-bottom:10px}
.stats-grid,.stats-bar{gap:10px;margin-bottom:26px}
.progress-bar,.stat-bar-inner,.progress-row{height:2px;border-radius:999px;background:var(--surface4)}
.progress-fill,.stat-bar-fill{background:var(--accent)}

/* ── Sidebar desktop ── */
#sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);backdrop-filter:none}
.logo-mark{font-family:var(--font-mono);font-size:15px;font-weight:700;letter-spacing:0}
.logo-mark span{color:var(--accent)}
.sb-item{height:44px;padding:0 12px;border-radius:var(--radius-sm);border-left:2px solid transparent;color:var(--text2);font-size:13.5px;font-weight:550}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.active{background:var(--accent-dim);color:var(--accent);border-left:2px solid var(--accent);box-shadow:none}
.sb-item.active .sb-badge{background:var(--accent);color:#fff}

/* ── Tabs ── */
.tabs,.main-tabs,.tracker-tabs{gap:2px;border-bottom:1px solid var(--border);margin-bottom:24px}
.tab,.tab-btn,.main-tab,.tracker-tab{font-family:var(--font-mono);font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);background:none;border:0;border-bottom:2px solid transparent;padding:12px 14px}
.tab:hover,.tab-btn:hover,.main-tab:hover,.tracker-tab:hover{color:var(--text)}
.tab.active,.tab-btn.active,.main-tab.active,.tracker-tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}
.tab.active .tab-count,.active>.tab-count{background:var(--accent);color:#fff}

/* ── Bottoni ── */
.btn-primary,.btn-add{height:48px;padding:0 22px;border:0;border-radius:var(--radius-pill);background:var(--accent);color:#fff;font-size:15px;font-weight:700;box-shadow:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:opacity .15s ease,transform .12s ease}
.btn-primary:hover,.btn-add:hover{opacity:.88;transform:none;filter:none}
.btn-primary:active,.btn-add:active{transform:scale(.97)}
.btn-ghost,.btn-sub,#backoffice-btn{height:48px;padding:0 20px;border-radius:var(--radius-pill);background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:15px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;transition:color .15s ease,border-color .15s ease,transform .12s ease}
.btn-ghost:hover,.btn-sub:hover,#backoffice-btn:hover{color:var(--text);border-color:var(--text3);background:transparent}
.btn-ghost:active,.btn-sub:active{transform:scale(.97)}

/* ── Input ── */
.add-input,.add-section input,.sub-add-row input,.add-subtask-row input,.task-name-edit,.subtask-name-edit,.edit-inp{height:48px;padding:0 16px;font-size:15px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text)}
.modal-note{padding:14px 16px;font-size:15px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);width:100%;margin-bottom:16px}
.add-input:focus,.add-section input:focus,.sub-add-row input:focus,.add-subtask-row input:focus,.modal-note:focus,.task-name-edit:focus,.subtask-name-edit:focus,.edit-inp:focus{border-color:var(--accent);outline:none;box-shadow:none}
::placeholder{color:var(--text3)}
.sub-add-row input{height:42px;font-size:14px}
.sub-add-row .btn-ghost{height:42px;font-size:13px;padding:0 16px}

/* ── Modal sheet ── */
.modal-overlay{background:rgba(0,0,0,.6);backdrop-filter:blur(6px);transition:opacity .2s ease}
.modal{border-radius:20px 20px 0 0;background:var(--surface);border:1px solid var(--border2);border-bottom:0;padding:16px 24px 28px;transform:translateY(100%);transition:transform .22s ease-in}
.modal-overlay.open .modal{transform:translateY(0);transition:transform .28s cubic-bezier(.32,.72,0,1)}
.modal-handle{width:36px;height:4px;border-radius:999px;background:var(--border2);margin:0 auto 20px}
.modal-title{font-size:19px;font-weight:700;letter-spacing:-.02em;margin-bottom:16px}
.modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:8px}

/* ── Split buttons (training modal) ── */
.split-btns{gap:10px;margin-bottom:16px}
.split-btn{padding:16px 8px;border-radius:var(--radius-md);border:1px solid var(--border);background:var(--surface2);color:var(--text2);font-size:17px;font-weight:700;transition:border-color .15s,background .15s,color .15s}
.split-btn.sel-A{background:rgba(85,217,138,.18);border-color:rgba(85,217,138,.45);color:var(--green)}
.split-btn.sel-B{background:rgba(231,191,102,.18);border-color:rgba(231,191,102,.45);color:var(--yellow)}
.split-btn.sel-C{background:rgba(141,120,255,.18);border-color:rgba(141,120,255,.45);color:var(--accent)}

/* ── Calendario training ── */
.cal-grid{gap:6px}
.cal-day{width:36px;height:36px;aspect-ratio:auto;place-self:center;border-radius:10px;font-size:13px;font-weight:500;border:1px solid transparent}
.cal-day:hover:not(.empty):not(.future){background:var(--surface2);border-color:var(--border)}
.cal-day.has-A{background:rgba(85,217,138,.18);border:1px solid rgba(85,217,138,.35);color:var(--green)}
.cal-day.has-B{background:rgba(231,191,102,.18);border:1px solid rgba(231,191,102,.35);color:var(--yellow)}
.cal-day.has-C{background:rgba(141,120,255,.18);border:1px solid rgba(141,120,255,.35);color:var(--accent)}
.cal-day.today{box-shadow:0 0 0 2px var(--accent);border-color:transparent}
.cal-day.future{opacity:.25;pointer-events:none}
.cal-nav button,.tracker-month-nav button{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:var(--surface2)}

/* ── Componenti master ── */
.split-legend{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px;padding-top:16px;border-top:1px solid var(--line-soft)}
.split-leg-item{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--text2)}
.split-leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.divider{height:1px;background:var(--border);margin:30px 0}
.streak-bar{display:flex;gap:4px;flex-wrap:wrap}
.streak-day{width:19px;height:19px;border-radius:6px;background:var(--surface3);border:1px solid var(--border)}
.streak-day.done-A{background:var(--green);border-color:var(--green)}
.streak-day.done-B{background:var(--yellow);border-color:var(--yellow)}
.streak-day.done-C{background:var(--accent);border-color:var(--accent)}
.split-card .split-name{font-size:16px;font-weight:700;letter-spacing:-.02em;margin-bottom:5px}
.split-muscles{font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3)}
.split-last{margin-top:14px;padding-top:11px;border-top:1px solid var(--line-soft);font-size:11.5px;color:var(--text2)}
.log-split-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tab-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:7px;vertical-align:middle}
.fin-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.content-type-label{font-size:12.5px;font-weight:600;color:var(--text2);min-width:112px}
.tracker-profiles{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.tracker-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.profile-block-stats{display:flex;gap:8px;flex-wrap:wrap}
.fin-status.trimestrale{background:rgba(110,159,208,.13);color:var(--accent2)}
.fin-status.ricorrente{background:rgba(177,140,255,.13);color:var(--purple)}

/* ── FAB Quick Add ── */
#fab-add{position:fixed;bottom:80px;right:20px;width:52px;height:52px;border-radius:999px;border:0;background:var(--accent);color:#fff;display:grid;place-items:center;cursor:pointer;box-shadow:var(--shadow-1);z-index:150;transition:opacity .15s ease,transform .12s ease}
#fab-add svg{width:24px;height:24px}
#fab-add:hover{opacity:.88}
#fab-add:active{transform:scale(.94)}

/* ── Quick Add pills ── */
.qa-row{margin-bottom:16px}
.qa-row label{display:block;margin-bottom:9px}
.qa-pills{display:flex;flex-wrap:wrap;gap:8px}
.qa-pill{--pill-color:var(--text3);padding:10px 15px;border-radius:999px;border:1px solid var(--border2);background:var(--surface2);color:var(--text2);font-size:13.5px;font-weight:600;cursor:pointer;transition:border-color .15s,background .15s,color .15s,transform .12s}
.qa-pill:hover{border-color:var(--pill-color);color:var(--text)}
.qa-pill:active{transform:scale(.96)}
.qa-pill-sel{background:color-mix(in srgb,var(--pill-color) 16%,transparent);border-color:color-mix(in srgb,var(--pill-color) 55%,transparent);color:var(--pill-color)}
.qa-status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.qa-status-grid .qa-pill{text-align:center;padding:10px 6px}
.qa-collapsible{max-height:0;overflow:hidden;opacity:0;transform:translateY(-8px);margin-bottom:0;transition:max-height .26s cubic-bezier(.32,.72,0,1),opacity .2s ease,transform .26s cubic-bezier(.32,.72,0,1),margin-bottom .26s}
.qa-collapsible.qa-open{max-height:220px;opacity:1;transform:none;margin-bottom:16px}

/* ── Bottom nav mobile ── */
.bn-badge{position:absolute;top:5px;right:calc(50% - 20px);background:var(--red);color:#fff;font-family:var(--font-mono);font-size:8px;font-weight:700;border-radius:999px;padding:1px 5px;min-width:14px;text-align:center;display:none}

@media(max-width:760px){
  .page,.main-panel,main{padding:20px 20px 110px}
  #bottom-nav{display:block;position:fixed;left:0;right:0;bottom:0;z-index:80;background:rgba(9,8,13,.88);backdrop-filter:blur(20px);border-top:1px solid rgba(255,255,255,.06);padding-bottom:env(safe-area-inset-bottom)}
  .bn-inner{height:64px;display:flex;align-items:center}
  .bn-item{position:relative;height:100%;justify-content:center;gap:5px;color:var(--text3);font-family:var(--font-mono);font-size:10px;text-transform:uppercase;letter-spacing:.04em}
  .bn-item svg{width:22px;height:22px}
  .bn-item.active{color:var(--accent)}
  .bn-item.active::after{content:'';position:absolute;bottom:7px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
  #fab-add{bottom:calc(80px + env(safe-area-inset-bottom))}
  .stats-grid,.stats-bar{grid-template-columns:repeat(2,1fr)}
  .tracker-summary{grid-template-columns:1fr}
  .qa-status-grid{grid-template-columns:repeat(2,1fr)}
  .modal{padding:14px 18px 24px}
  .btn-primary,.btn-add,.btn-ghost,.btn-sub{height:46px;font-size:14px}
}


/* ═══════════════════════════════════════════════════════════════
   DYRECTIO — Liquid Glass (ispirato al design system iOS 26)
   Materiali vetro traslucido, luce specular, profondità, ambient
   color legato a --company-color. Solo stile — nessuna logica JS.
   ═══════════════════════════════════════════════════════════════ */

:root{
  --radius-sm:12px; --radius-md:17px; --radius-lg:24px; --radius-xl:30px;
  --ease-spring:cubic-bezier(.22,1,.36,1);
  --glass-hl:inset 0 1px 0 rgba(255,255,255,.10), inset 0 0 0 1px rgba(255,255,255,.025);
  --glass-border:1px solid rgba(255,255,255,.09);
}

/* ── Ambient background: colore del cliente che "respira" dietro il vetro ── */
html{background:var(--bg)}
body{
  background:
    radial-gradient(ellipse 1000px 640px at 12% -8%, color-mix(in srgb,var(--company-color) 26%,transparent), transparent 62%),
    radial-gradient(ellipse 760px 520px at 104% 8%, rgba(141,120,255,.14), transparent 58%),
    radial-gradient(ellipse 820px 600px at 45% 112%, color-mix(in srgb,var(--company-color) 12%,transparent), transparent 60%),
    var(--bg);
  background-attachment:fixed;
}

/* ── Sidebar: pannello di vetro fluttuante ── */
#sidebar{
  margin:14px 0 14px 14px;
  top:14px;
  height:calc(100vh - 28px);
  border-radius:var(--radius-lg);
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.014)),rgba(17,16,22,.5);
  backdrop-filter:blur(30px) saturate(1.7);
  -webkit-backdrop-filter:blur(30px) saturate(1.7);
  border:var(--glass-border);
  box-shadow:var(--glass-hl),0 24px 60px rgba(0,0,0,.42);
}
.sb-logo{border-bottom:1px solid rgba(255,255,255,.07)}
.sb-footer{border-top:1px solid rgba(255,255,255,.07)}
.sb-item.active{background:color-mix(in srgb,var(--company-color) 16%,transparent)}
.conn-pill,#conn-status{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px)}
#lock-btn{background:rgba(255,255,255,.05)!important;border:1px solid rgba(255,255,255,.08)!important}

/* ── Header (versioni per-client con <header>) ── */
header{
  background:linear-gradient(180deg,rgba(255,255,255,.035),rgba(255,255,255,.008)),rgba(17,16,22,.4);
  backdrop-filter:blur(24px) saturate(1.5);
  -webkit-backdrop-filter:blur(24px) saturate(1.5);
  border-bottom:1px solid rgba(255,255,255,.07);
}

/* ── Card di superficie (poche per pagina: blur pieno) ── */
.stat-card,.stat,.card,.fin-card,.split-card,.profile-block,.target-card,.tracker-sum-card,.comp-cat-card,.train-cal-wrap{
  background:linear-gradient(155deg,rgba(255,255,255,.055) 0%,rgba(255,255,255,.014) 40%,rgba(255,255,255,.008) 100%),rgba(23,22,29,.5);
  backdrop-filter:blur(22px) saturate(1.5);
  -webkit-backdrop-filter:blur(22px) saturate(1.5);
  border:var(--glass-border);
  box-shadow:var(--glass-hl),0 10px 34px rgba(0,0,0,.32);
  border-radius:var(--radius-lg);
}
.stat-card:hover,.stat:hover,.split-card:hover,.profile-block:hover{
  border-color:rgba(255,255,255,.16);
  box-shadow:var(--glass-hl),0 4px 18px rgba(0,0,0,.3),0 26px 56px rgba(0,0,0,.3);
}
.card-sm{
  background:linear-gradient(155deg,rgba(255,255,255,.045),rgba(255,255,255,.01)),rgba(23,22,29,.5);
  border:var(--glass-border); box-shadow:var(--glass-hl); border-radius:var(--radius-md);
}

/* ── Task row / item: vetro leggero (senza blur, per performance su liste lunghe) ── */
.task-row,.task-item{
  background:linear-gradient(180deg,rgba(255,255,255,.032),rgba(255,255,255,.006)),rgba(23,22,29,.46);
  border:1px solid rgba(255,255,255,.065);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.05);
  border-radius:var(--radius-md);
}
.task-row:hover,.task-item:hover{
  background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.01)),rgba(30,29,37,.55);
  border-color:rgba(255,255,255,.12);
}
.sub-row,.subtask-item{background:rgba(255,255,255,.028);border:1px solid rgba(255,255,255,.06)}
.subtask-panel,.subtasks-panel{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.065);border-top:0}

/* ── Bottoni: vetro con luce e profondità colorata ── */
.btn-primary,.btn-add{
  background:linear-gradient(180deg,color-mix(in srgb,var(--company-color) 94%,white 12%),var(--company-color));
  border:1px solid color-mix(in srgb,var(--company-color) 75%,white 18%);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.32),0 8px 22px color-mix(in srgb,var(--company-color) 40%,transparent),0 2px 6px rgba(0,0,0,.28);
}
.btn-primary:hover,.btn-add:hover{filter:brightness(1.08);opacity:1;transform:none}
.btn-primary:active,.btn-add:active{transform:scale(.96);filter:brightness(.98)}
.btn-ghost,.btn-sub,#backoffice-btn{
  background:rgba(255,255,255,.055);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.1);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.07);
}
.btn-ghost:hover,.btn-sub:hover,#backoffice-btn:hover{background:rgba(255,255,255,.09);border-color:rgba(255,255,255,.16)}
.ibtn,.icon-btn{background:rgba(255,255,255,.03)}
.ibtn:hover,.icon-btn:hover{background:rgba(255,255,255,.08)}

/* ── Input: vetro incassato ── */
.add-input,.add-section input,.sub-add-row input,.add-subtask-row input,.task-name-edit,.subtask-name-edit,.edit-inp,.sel,.status-select,.fin-select,.modal-note{
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.09);
  box-shadow:inset 0 1px 3px rgba(0,0,0,.18);
}
.add-input:focus,.add-section input:focus,.sub-add-row input:focus,.add-subtask-row input:focus,.modal-note:focus,.task-name-edit:focus,.subtask-name-edit:focus,.edit-inp:focus{
  border-color:var(--company-color);
  box-shadow:inset 0 1px 3px rgba(0,0,0,.18),0 0 0 3px color-mix(in srgb,var(--company-color) 22%,transparent);
}
.add-section{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(14px)}

/* ── Badge/pill: vetro sottile ── */
.badge,.status-badge,.fin-status,.profile-stat-pill,.tab-count,.sb-badge,.exp-count,.sub-count,.qa-pill{
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.05);
}
.badge-project{background:rgba(255,255,255,.06)}

/* ── Tabs: glow sottile sull'attivo, colore per cliente ── */
.tab.active,.tab-btn.active,.main-tab.active,.tracker-tab.active{
  color:var(--company-color);
  border-bottom-color:var(--company-color);
  text-shadow:0 0 16px color-mix(in srgb,var(--company-color) 45%,transparent);
}
.tab.active .tab-count,.active>.tab-count,.tab-btn.active .tab-count{background:var(--company-color)}

/* ── Modal sheet: vetro denso, luce dal basso ── */
.modal-overlay{background:rgba(0,0,0,.55);backdrop-filter:blur(12px) saturate(1.3);-webkit-backdrop-filter:blur(12px) saturate(1.3)}
.modal{
  background:linear-gradient(180deg,rgba(255,255,255,.065),rgba(255,255,255,.016)),rgba(17,16,22,.72);
  backdrop-filter:blur(42px) saturate(1.8);
  -webkit-backdrop-filter:blur(42px) saturate(1.8);
  border:1px solid rgba(255,255,255,.13);
  box-shadow:var(--glass-hl),0 -8px 60px rgba(0,0,0,.35);
  border-radius:26px 26px 0 0;
}
.modal-handle{background:rgba(255,255,255,.22)}
.qa-pill{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}
.qa-pill-sel{box-shadow:inset 0 1px 0 rgba(255,255,255,.15)}

/* ── FAB: orb di vetro con glow ── */
#fab-add{
  background:radial-gradient(circle at 32% 26%,color-mix(in srgb,var(--accent) 85%,white 22%),var(--accent));
  border:1px solid rgba(255,255,255,.28);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 4px 18px color-mix(in srgb,var(--accent) 55%,transparent),0 12px 36px rgba(0,0,0,.42);
}
#fab-add:hover{filter:brightness(1.06)}

/* ── Bottom nav mobile: capsula di vetro fluttuante ── */
@media(max-width:760px){
  #bottom-nav{
    left:12px;right:12px;
    bottom:calc(env(safe-area-inset-bottom) + 10px);
    border-radius:28px;
    background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.02)),rgba(9,8,13,.6);
    backdrop-filter:blur(34px) saturate(1.9);
    -webkit-backdrop-filter:blur(34px) saturate(1.9);
    border:1px solid rgba(255,255,255,.11);
    box-shadow:var(--glass-hl),0 14px 44px rgba(0,0,0,.5);
    padding-bottom:0;
  }
  .bn-inner{height:60px}
  .bn-item.active::before{background:color-mix(in srgb,var(--company-color) 20%,transparent)}
  .bn-item.active{color:var(--company-color)}
  #main{padding-bottom:0}
  .page,.main-panel,main{padding-top:calc(env(safe-area-inset-top) + 20px);padding-bottom:calc(env(safe-area-inset-bottom) + 118px)}
  #fab-add{bottom:calc(env(safe-area-inset-bottom) + 84px)}
  #toast{bottom:calc(env(safe-area-inset-bottom) + 92px)}
}

/* ── Streak / calendario: leggero effetto vetro sulle celle attive ── */
.cal-day.has-A,.cal-day.has-B,.cal-day.has-C{box-shadow:inset 0 1px 0 rgba(255,255,255,.12)}
.day-btn.published{box-shadow:inset 0 1px 0 rgba(255,255,255,.25)}

/* ── Comp categorie / auto block: leggero rilievo di vetro ── */
.comp-auto-block,.comp-listino{background:rgba(255,255,255,.035);border:1px solid rgba(255,255,255,.07)}


/* ═══════════════ DYRECTIO — motion & polish ═══════════════ */
:root{
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --ease-out:cubic-bezier(.16,1,.3,1);
}

/* ── Transizioni di pagina più "vive" ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}
.page.active,.main-panel.active,.tab-panel.active,.company-panel.active{animation:fadeInUp .34s var(--ease-out)}

/* ── Ingresso a cascata delle liste task ── */
@keyframes taskIn{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.task-wrapper{animation:taskIn .38s var(--ease-out) backwards}
.task-wrapper:nth-child(1){animation-delay:.02s}
.task-wrapper:nth-child(2){animation-delay:.05s}
.task-wrapper:nth-child(3){animation-delay:.08s}
.task-wrapper:nth-child(4){animation-delay:.11s}
.task-wrapper:nth-child(5){animation-delay:.14s}
.task-wrapper:nth-child(6){animation-delay:.17s}
.task-wrapper:nth-child(7){animation-delay:.20s}
.task-wrapper:nth-child(8){animation-delay:.23s}
.task-wrapper:nth-child(9){animation-delay:.26s}
.task-wrapper:nth-child(10){animation-delay:.29s}
.task-wrapper:nth-child(n+11){animation-delay:.32s}

/* ── Ingresso a cascata delle stat card ── */
.stats-grid .stat-card,.stats-bar .stat{animation:taskIn .4s var(--ease-out) backwards}
.stats-grid .stat-card:nth-child(1),.stats-bar .stat:nth-child(1){animation-delay:.03s}
.stats-grid .stat-card:nth-child(2),.stats-bar .stat:nth-child(2){animation-delay:.08s}
.stats-grid .stat-card:nth-child(3),.stats-bar .stat:nth-child(3){animation-delay:.13s}
.stats-grid .stat-card:nth-child(4),.stats-bar .stat:nth-child(4){animation-delay:.18s}

/* ── Riempimento barre di progresso animato ── */
.progress-fill,.stat-bar-fill{transition:width .9s var(--ease-out)}

/* ── FAB: respiro continuo, si ferma al tocco ── */
@keyframes fabBreathe{0%,100%{box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 4px 18px color-mix(in srgb,var(--accent) 55%,transparent),0 12px 36px rgba(0,0,0,.42)}50%{box-shadow:inset 0 1px 0 rgba(255,255,255,.45),0 6px 26px color-mix(in srgb,var(--accent) 78%,transparent),0 14px 40px rgba(0,0,0,.42)}}
#fab-add{animation:fabBreathe 3.4s ease-in-out infinite}
#fab-add:hover,#fab-add:active{animation-play-state:paused}

/* ── Toast: entrata a molla ── */
#toast{transition:transform .5s var(--ease-spring),opacity .25s ease}

/* ── Transizioni di colore morbide quando cambi progetto/cliente ── */
.sb-item{transition:background .18s var(--ease),color .4s ease,box-shadow .3s ease}
.tab,.tab-btn,.main-tab,.tracker-tab{transition:color .35s ease,border-color .35s ease}
.open-gestionale-btn{transition:background .3s ease,border-color .3s ease,color .3s ease,transform .12s ease}
.tab-dot{transition:background .3s ease}
.bn-item{transition:color .35s ease}

/* ── Pulse di conferma su task completata ── */
@keyframes statusPulse{0%{box-shadow:0 0 0 0 rgba(85,217,138,.55)}70%{box-shadow:0 0 0 16px rgba(85,217,138,0)}100%{box-shadow:0 0 0 0 rgba(85,217,138,0)}}
.status-just-done{animation:statusPulse .85s var(--ease-out)}

/* ── Sub-task panel: easing più morbido in apertura ── */
.subtask-panel,.subtasks-panel{transition:max-height .36s var(--ease-spring),padding .3s var(--ease-out)}

/* ── Modal: leggero rimbalzo in apertura ── */
.modal-overlay.open .modal{transition:transform .38s var(--ease-spring)}

/* ── Rispetta chi preferisce meno movimento ── */
@media(prefers-reduced-motion:reduce){
  .page.active,.main-panel.active,.tab-panel.active,.company-panel.active,
  .task-wrapper,.stats-grid .stat-card,.stats-bar .stat,
  #fab-add{animation:none!important}
  *{transition-duration:.01ms!important}
}

</style>
</head>
<body class="readonly">
<div id="loading"><div class="loader"></div><p>Caricamento…</p></div>
<div id="toast"></div>

<div id="app" style="display:none">
  <header>
    <div class="header-left">
      <h1>Gestionale <span>Luigi Stips</span></h1>
      <div class="header-sub"><span class="status-dot"></span>Dashboard operativa · sola visualizzazione</div>
    </div>
    <div class="header-right">
      <div id="conn-status">● Connessione…</div>
    </div>
  </header>

  <div class="main-tabs">
    <button class="main-tab active" onclick="switchMainTab('tasks',this)">📋 Task</button>
    <button class="main-tab" onclick="switchMainTab('tracker',this)">📅 Pubblicazioni</button>
  </div>

  <div class="main-panel active" id="panel-tasks">
    <div class="stats-bar" id="stats-bar"></div>
    <div class="tasks-list" id="tasks-list"></div>
  </div>

  <div class="main-panel" id="panel-tracker">
    <div id="tracker-content"></div>
  </div>
</div>

<script type="module">
const CID = 'luigi_luigi';
// Grow With Luigi rimosso da luglio 2026
const PROFILES = [
  {id:'luigi_stips', name:'Luigi Stips', types:[
    {id:'reel',   label:'🎬 Reel'},
    {id:'storia', label:'⏱ Storia'},
  ]},
];
const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];

let db, allTasks={}, openAcc=new Set(), editingId=null;
let trackerYear=new Date().getFullYear(), trackerMonth=new Date().getMonth();
let trackerData={}, trackerLoaded=false;

// ── FIREBASE ──
async function init(){
  const {initializeApp}=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js');
  const {getDatabase,ref,onValue,set,remove,push,get}=await import('https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js');
  const app=initializeApp({
    apiKey:'AIzaSyAfy8G_pHz8DftywbYi4YX1k71EyrmOgxQ',
    authDomain:'gestionale-gabriele.firebaseapp.com',
    databaseURL:'https://gestionale-gabriele-default-rtdb.europe-west1.firebasedatabase.app',
    projectId:'gestionale-gabriele',
  });
  db=getDatabase(app);
  const cs=document.getElementById('conn-status');
  cs.textContent='● Live'; cs.className='connected';

  onValue(ref(db,`tasks/${CID}`),snap=>{allTasks=snap.val()||{};renderTasks();renderStats();});

  window._set=(p,v)=>set(ref(db,p),v);
  window._remove=p=>remove(ref(db,p));
  window._push=(p,v)=>push(ref(db,p),v);
  window._get=p=>get(ref(db,p));

  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
}

// ── MAIN TAB SWITCH ──
window.switchMainTab=function(tab,btn){
  document.querySelectorAll('.main-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.main-panel').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById(`panel-${tab}`).classList.add('active');
  if(tab==='tracker'&&!trackerLoaded){trackerLoaded=true;loadTracker();}
  else if(tab==='tracker') renderTracker();
};

// ── STATS ──
function renderStats(){
  const arr=Object.values(allTasks);
  const total=arr.length, done=arr.filter(t=>t.status==='done').length;
  const subs=arr.flatMap(t=>Object.values(t.subtasks||{}));
  const totalS=subs.length, doneS=subs.filter(s=>s.status==='done').length;
  const pct=total+totalS>0?Math.round((done+doneS)/(total+totalS)*100):0;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat"><div class="stat-label">Task</div><div class="stat-num">${total}</div></div>
    <div class="stat"><div class="stat-label">Sub-task</div><div class="stat-num">${totalS}</div></div>
    <div class="stat"><div class="stat-label">Completate</div><div class="stat-num hl">${done+doneS}</div></div>
    <div class="stat"><div class="stat-label">Progresso</div><div class="stat-num hl">${pct}%</div>
      <div class="stat-bar-inner"><div class="stat-bar-fill" style="width:${pct}%"></div></div></div>`;
}

// ── TASKS ──
function renderTasks(){
  const order={inprogress:0,todo:1,incomplete:2,missingfiles:3,done:4};
  const arr=Object.entries(allTasks).sort((a,b)=>{
    const so=(order[a[1].status]??1)-(order[b[1].status]??1);
    return so||(a[1].createdAt||0)-(b[1].createdAt||0);
  });
  const el=document.getElementById('tasks-list');
  if(arr.length===0){el.innerHTML='<div class="empty-state">📋 Nessuna task ancora.</div>';return;}
  el.innerHTML=arr.map(([tid,t])=>taskHTML(tid,t)).join('');
  openAcc.forEach(tid=>{
    document.getElementById(`sp-${tid}`)?.classList.add('open');
    document.getElementById(`eb-${tid}`)?.classList.add('open');
    document.getElementById(`wr-${tid}`)?.classList.add('has-subtasks-open');
  });
  if(editingId){
    const inp=editingId.type==='task'?`te-${editingId.tid}`:`se-${editingId.sid}`;
    setTimeout(()=>{const e=document.getElementById(inp);if(e){e.focus();e.select();}},30);
  }
}

function taskHTML(tid,t){
  const subs=t.subtasks?Object.entries(t.subtasks).sort((a,b)=>(a[1].createdAt||0)-(b[1].createdAt||0)):[];
  const sc=subs.length, dc=subs.filter(([,s])=>s.status==='done').length;
  const isEditing=editingId?.type==='task'&&editingId?.tid===tid;
  const labels={todo:'Da fare',inprogress:'In corso',done:'Completata',incomplete:'Incompleto',missingfiles:'File mancanti'};
  const badgeCls={todo:'badge-todo',inprogress:'badge-inprogress',done:'badge-done',incomplete:'badge-incomplete',missingfiles:'badge-missingfiles'};
  const date=t.createdAt?new Date(t.createdAt).toLocaleDateString('it-IT',{day:'2-digit',month:'short'}):'';
  const expCls=`expand-btn${sc>0&&dc<sc?' has-incomplete':''}${sc>0&&dc===sc?' all-done':''}`;
  const row=`<div class="task-item status-${t.status||'todo'}" id="ti-${tid}">
    <button class="${expCls}" id="eb-${tid}" onclick="toggleAcc('${tid}')">
      <span class="arrow">▶</span><span class="sub-count">${sc}</span>
    </button>
    ${isEditing
      ?`<input class="task-name-edit" id="te-${tid}" value="${esc(t.name)}" onkeydown="if(event.key==='Enter')saveTaskEdit('${tid}');if(event.key==='Escape')cancelEdit()"/>`
      :`<span class="task-name">${esc(t.name)}</span>`}
    <div class="task-meta">
      ${!isEditing?`<span class="status-badge ${badgeCls[t.status||'todo']}">${labels[t.status||'todo']}</span>`:''}
      <select class="status-select" onchange="updateStatus('${tid}',this.value)">
        <option value="todo" ${t.status==='todo'?'selected':''}>Da fare</option>
        <option value="inprogress" ${t.status==='inprogress'?'selected':''}>In corso</option>
        <option value="done" ${t.status==='done'?'selected':''}>Completata</option>
        <option value="incomplete" ${t.status==='incomplete'?'selected':''}>Incompleto</option>
        <option value="missingfiles" ${t.status==='missingfiles'?'selected':''}>File mancanti</option>
      </select>
      <span class="edit-only" style="display:contents">
        ${!isEditing
          ?`<button class="icon-btn" onclick="startTaskEdit('${tid}')">✏️</button>`
          :`<button class="icon-btn" onclick="saveTaskEdit('${tid}')">💾</button><button class="icon-btn" onclick="cancelEdit()">✕</button>`}
        <button class="icon-btn delete" onclick="deleteTask('${tid}')">🗑</button>
      </span>
      ${date?`<span class="task-date">${date}</span>`:''}
    </div>
  </div>`;
  const subRows=subs.map(([sid,s])=>subHTML(tid,sid,s)).join('');
  const panel=`<div class="subtasks-panel" id="sp-${tid}">
    <div class="subtasks-list">${sc===0?'<div style="font-size:0.72rem;color:var(--muted)">Nessuna sub-task.</div>':subRows}</div>
    <div class="add-subtask-row edit-only">
      <input type="text" id="si-${tid}" placeholder="Nuova sub-task…" onkeydown="if(event.key==='Enter')addSubtask('${tid}')"/>
      <button class="btn-sub" onclick="addSubtask('${tid}')">+ Sub-task</button>
    </div>
  </div>`;
  return `<div class="task-wrapper" id="wr-${tid}">${row}${panel}</div>`;
}

function subHTML(tid,sid,s){
  const isEditing=editingId?.type==='subtask'&&editingId?.sid===sid;
  const labels={todo:'Da fare',inprogress:'In corso',done:'Completata',incomplete:'Incompleto',missingfiles:'File mancanti'};
  const badgeCls={todo:'badge-todo',inprogress:'badge-inprogress',done:'badge-done',incomplete:'badge-incomplete',missingfiles:'badge-missingfiles'};
  return `<div class="subtask-item status-${s.status||'todo'}">
    <span class="subtask-arrow">↳</span>
    ${isEditing
      ?`<input class="subtask-name-edit" id="se-${sid}" value="${esc(s.name)}" onkeydown="if(event.key==='Enter')saveSubEdit('${tid}','${sid}');if(event.key==='Escape')cancelEdit()"/>`
      :`<span class="subtask-name">${esc(s.name)}</span>`}
    <div class="task-meta">
      ${!isEditing?`<span class="status-badge ${badgeCls[s.status||'todo']}" style="font-size:0.58rem">${labels[s.status||'todo']}</span>`:''}
      <select class="status-select" style="font-size:0.65rem" onchange="updateSubStatus('${tid}','${sid}',this.value)">
        <option value="todo" ${s.status==='todo'?'selected':''}>Da fare</option>
        <option value="inprogress" ${s.status==='inprogress'?'selected':''}>In corso</option>
        <option value="done" ${s.status==='done'?'selected':''}>Completata</option>
        <option value="incomplete" ${s.status==='incomplete'?'selected':''}>Incompleto</option>
        <option value="missingfiles" ${s.status==='missingfiles'?'selected':''}>File mancanti</option>
      </select>
      <span class="edit-only" style="display:contents">
        ${!isEditing
          ?`<button class="icon-btn" style="font-size:0.75rem" onclick="startSubEdit('${tid}','${sid}')">✏️</button>`
          :`<button class="icon-btn" onclick="saveSubEdit('${tid}','${sid}')">💾</button><button class="icon-btn" onclick="cancelEdit()">✕</button>`}
        <button class="icon-btn delete" style="font-size:0.75rem" onclick="deleteSubtask('${tid}','${sid}')">🗑</button>
      </span>
    </div>
  </div>`;
}

window.toggleAcc=function(tid){
  const panel=document.getElementById(`sp-${tid}`),btn=document.getElementById(`eb-${tid}`),wrap=document.getElementById(`wr-${tid}`);
  if(!panel)return;
  if(openAcc.has(tid)){openAcc.delete(tid);panel.classList.remove('open');btn?.classList.remove('open');wrap?.classList.remove('has-subtasks-open');}
  else{openAcc.add(tid);panel.classList.add('open');btn?.classList.add('open');wrap?.classList.add('has-subtasks-open');setTimeout(()=>document.getElementById(`si-${tid}`)?.focus(),50);}
};
window.updateStatus=async function(tid,s){if(!db)return;try{await window._set(`tasks/${CID}/${tid}/status`,s);toast('Aggiornato ✓');}catch(e){toast('Errore');}};
window.deleteTask=async function(tid){if(!db)return;const n=Object.keys(allTasks[tid]?.subtasks||{}).length;if(!confirm(n>0?`Eliminare task e ${n} sub-task?`:'Eliminare task?'))return;try{await window._remove(`tasks/${CID}/${tid}`);openAcc.delete(tid);toast('Eliminata');}catch(e){toast('Errore');}};
window.startTaskEdit=function(tid){editingId={type:'task',tid};renderTasks();};
window.saveTaskEdit=async function(tid){const inp=document.getElementById(`te-${tid}`);if(!inp)return;const name=inp.value.trim();if(!name||!db)return;try{await window._set(`tasks/${CID}/${tid}/name`,name);editingId=null;toast('Modificata ✓');}catch(e){toast('Errore');}};
window.addSubtask=async function(tid){const inp=document.getElementById(`si-${tid}`);const name=inp.value.trim();if(!name||!db)return;try{await window._push(`tasks/${CID}/${tid}/subtasks`,{name,status:'todo',createdAt:Date.now()});inp.value='';openAcc.add(tid);toast('Sub-task aggiunta ✓');}catch(e){toast('Errore');}};
window.updateSubStatus=async function(tid,sid,s){if(!db)return;try{await window._set(`tasks/${CID}/${tid}/subtasks/${sid}/status`,s);toast('Aggiornato ✓');}catch(e){toast('Errore');}};
window.deleteSubtask=async function(tid,sid){if(!db)return;if(!confirm('Eliminare sub-task?'))return;try{await window._remove(`tasks/${CID}/${tid}/subtasks/${sid}`);toast('Eliminata');}catch(e){toast('Errore');}};
window.startSubEdit=function(tid,sid){editingId={type:'subtask',tid,sid};openAcc.add(tid);renderTasks();};
window.saveSubEdit=async function(tid,sid){const inp=document.getElementById(`se-${sid}`);if(!inp)return;const name=inp.value.trim();if(!name||!db)return;try{await window._set(`tasks/${CID}/${tid}/subtasks/${sid}/name`,name);editingId=null;toast('Modificata ✓');}catch(e){toast('Errore');}};
window.cancelEdit=function(){editingId=null;renderTasks();};

// ── TRACKER ──
async function loadTracker(){
  if(!db)return;
  try{
    const snap=await window._get('tracker/luigi');
    trackerData=snap.val()||{};
  }catch(e){trackerData={};}
  renderTracker();
}

window.toggleDay=async function(profileId,typeId,dateStr){
  if(!db)return;
  const key=(profileId+'_'+typeId+'_'+dateStr).replace(/[^a-zA-Z0-9_]/g,'_');
  const newVal=!trackerData[key];
  if(newVal)trackerData[key]=true; else delete trackerData[key];
  try{await window._set('tracker/luigi/'+key,newVal||null);renderTracker();toast(newVal?'✓ Segnato':'Rimosso');}
  catch(e){toast('Errore: '+e.message);}
};
window.trackerPrev=function(){trackerMonth--;if(trackerMonth<0){trackerMonth=11;trackerYear--;}loadTracker();};
window.trackerNext=function(){trackerMonth++;if(trackerMonth>11){trackerMonth=0;trackerYear++;}loadTracker();};

function renderTracker(){
  const el=document.getElementById('tracker-content');
  if(!el)return;
  const todayStr=new Date().toISOString().split('T')[0];
  const daysInMonth=new Date(trackerYear,trackerMonth+1,0).getDate();

  // Moltiplicatori per tipo contenuto
  const MULT={'luigi_stips_reel':6,'luigi_stips_storia':4};
  function getMult(pid,tid){return MULT[pid+'_'+tid]||1;}

  // Calcola totali (giorni cliccati * moltiplicatore)
  const totals={};
  const giorni={}; // giorni effettivi cliccati (per display calendario)
  PROFILES.forEach(p=>{
    totals[p.id]={};
    giorni[p.id]={};
    p.types.forEach(t=>{
      let c=0;
      for(let d=1;d<=daysInMonth;d++){
        const ds=trackerYear+'-'+String(trackerMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        const k=(p.id+'_'+t.id+'_'+ds).replace(/[^a-zA-Z0-9_]/g,'_');
        if(trackerData[k])c++;
      }
      giorni[p.id][t.id]=c;
      totals[p.id][t.id]=c*getMult(p.id,t.id);
    });
  });

  const lsR=totals['luigi_stips']?.reel||0;
  const lsS=totals['luigi_stips']?.storia||0;

  // Target
  const targetLsReel=6*daysInMonth;
  const targetLsStorie=4*daysInMonth;
  const pctLsR=Math.min(100,Math.round(lsR/targetLsReel*100));
  const pctLsS=Math.min(100,Math.round(lsS/targetLsStorie*100));

  // Compenso
  const compReel=150, compStorie=40;
  const compTot=compReel+compStorie;

  // Profili HTML
  const profilesHTML=PROFILES.map(p=>{
    const typesHTML=p.types.map(t=>{
      const daysHTML=Array.from({length:daysInMonth},(_,i)=>{
        const d=i+1;
        const ds=trackerYear+'-'+String(trackerMonth+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
        const k=(p.id+'_'+t.id+'_'+ds).replace(/[^a-zA-Z0-9_]/g,'_');
        const pub=!!trackerData[k];
        const isToday=ds===todayStr,isFuture=ds>todayStr;
        let cls='day-btn';
        if(pub)cls+=' published';
        if(isToday)cls+=' today';
        if(isFuture)cls+=' future';
        return `<button class="${cls}" onclick="toggleDay('${p.id}','${t.id}','${ds}')" title="${ds}">${d}</button>`;
      }).join('');
      return `<div class="content-type-row"><span class="content-type-label">${t.label}</span><div class="days-grid">${daysHTML}</div></div>`;
    }).join('');
    const statsHTML=p.types.map(t=>{
      const m=getMult(p.id,t.id);
      const sub=m>1?' ('+m+'/g)':'';
      return '<span class="profile-stat-pill">'+t.label+sub+': <span>'+totals[p.id][t.id]+'</span></span>';
    }).join('');
    return `<div class="profile-block">
      <div class="profile-block-header"><span class="profile-block-name">${esc(p.name)}</span><div class="profile-block-stats">${statsHTML}</div></div>
      <div>${typesHTML}</div>
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="tracker-header">
      <span class="tracker-title">📅 ${MONTHS[trackerMonth]} ${trackerYear}</span>
      <div class="tracker-month-nav">
        <button onclick="trackerPrev()">‹</button>
        <span class="tracker-month-label">${MONTHS[trackerMonth]} ${trackerYear}</span>
        <button onclick="trackerNext()">›</button>
      </div>
    </div>

    <div class="tracker-profiles">${profilesHTML}</div>

    <div style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:0.6rem;">Progresso target mensile</div>
    <div class="target-grid">
      <div class="target-card">
        <div class="target-label">LS · Reel <span style="color:var(--muted);font-weight:400">/ ${targetLsReel}</span></div>
        <div class="target-num">${lsR}</div>
        <div class="progress-row"><div class="progress-fill" style="width:${pctLsR}%;background:var(--yellow)"></div></div>
        <div class="target-sub">${targetLsReel-lsR>0?`${targetLsReel-lsR} mancanti`:'✓ Target raggiunto'}</div>
      </div>
      <div class="target-card">
        <div class="target-label">LS · Storie <span style="color:var(--muted);font-weight:400">/ ${targetLsStorie}</span></div>
        <div class="target-num">${lsS}</div>
        <div class="progress-row"><div class="progress-fill" style="width:${pctLsS}%;background:var(--green)"></div></div>
        <div class="target-sub">${targetLsStorie-lsS>0?`${targetLsStorie-lsS} mancanti`:'✓ Target raggiunto'}</div>
      </div>
    </div>

    <div style="font-size:0.65rem;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);margin-bottom:0.6rem;">Compenso mese</div>
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:2rem;">
      <div class="compenso-row">
        <div><div class="compenso-label">🎬 Reel Luigi Stips</div><div class="compenso-sub">6/giorno · fisso mensile</div></div>
        <span class="compenso-amt">+€150</span>
      </div>
      <div class="compenso-row">
        <div><div class="compenso-label">⏱ Storie Luigi Stips</div><div class="compenso-sub">4/giorno · fisso mensile</div></div>
        <span class="compenso-amt">+€40</span>
      </div>
      <div class="compenso-row" style="background:var(--surface2)">
        <span style="font-size:0.9rem;font-weight:700">Totale</span>
        <span class="compenso-total">+€${compTot}</span>
      </div>
    </div>`;
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2200);}

init();
</script>
</body>
</html>
